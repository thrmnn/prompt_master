# Benchmark cases for the "workflow" target domain.

[meta]
domain = "workflow"
description = "Multi-agent workflow and parallelization benchmarks"

[[cases]]
id = "wf-01"
name = "simple_pipeline"
idea = "process customer support tickets"
difficulty = "easy"
description = "Basic workflow — should identify classification, routing, and response agents"
expect_sections = ["Role", "Task"]
expect_keywords = ["agent", "ticket"]
expect_keywords_any = ["classify", "route", "respond", "triage", "parallel"]
min_length = 150

[[cases]]
id = "wf-02"
name = "data_etl"
idea = "build a data pipeline that extracts from multiple APIs, transforms, and loads into a warehouse"
difficulty = "medium"
description = "Classic ETL — extractors should be parallelized, load is sequential"
expect_sections = ["Role", "Task"]
expect_keywords = ["pipeline", "agent"]
expect_keywords_any = ["parallel", "concurrent", "extract", "transform", "load", "fan-out"]
min_length = 200

[[cases]]
id = "wf-03"
name = "content_generation"
idea = "generate a blog post with research, writing, and SEO optimization"
difficulty = "medium"
description = "Multi-stage content workflow with specialist agents"
expect_sections = ["Role", "Task"]
expect_keywords = ["agent"]
expect_keywords_any = ["research", "writ", "SEO", "review", "parallel"]
min_length = 150

[[cases]]
id = "wf-04"
name = "code_review_system"
idea = "automated code review system that checks style, security, performance, and tests"
difficulty = "hard"
description = "Fan-out pattern — all review agents can run in parallel"
expect_sections = ["Role", "Task"]
expect_keywords = ["agent"]
expect_keywords_any = ["parallel", "concurrent", "fan-out", "security", "performance", "style"]
min_length = 200

[[cases]]
id = "wf-05"
name = "complex_orchestration"
idea = "build an AI-powered hiring pipeline: resume screening, skill assessment, interview scheduling, and candidate ranking"
difficulty = "hard"
description = "Complex workflow with mixed parallel and sequential stages, human-in-the-loop"
expect_sections = ["Role", "Task"]
expect_keywords = ["agent"]
expect_keywords_any = ["parallel", "sequential", "orchestrat", "pipeline", "screen", "assess"]
min_length = 200
