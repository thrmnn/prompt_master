# Benchmark cases for the "general" target domain.
# Each [[cases]] entry defines a test scenario with input, expected structural
# qualities, and required keywords in the optimized output.

[meta]
domain = "general"
description = "General-purpose prompt optimization benchmarks"

[[cases]]
id = "gen-01"
name = "vague_greeting"
idea = "help me write better"
difficulty = "easy"
description = "Extremely vague input — optimizer must add structure"
expect_sections = ["Role", "Task"]
expect_keywords = ["writing", "improve"]
min_length = 80

[[cases]]
id = "gen-02"
name = "email_request"
idea = "write an email to my boss about working from home"
difficulty = "easy"
description = "Common task with implicit audience and tone"
expect_sections = ["Role", "Task", "Output Format"]
expect_keywords = ["email", "professional"]
min_length = 100

[[cases]]
id = "gen-03"
name = "recipe_ambiguous"
idea = "something with chicken for dinner"
difficulty = "medium"
description = "Ambiguous culinary request"
expect_sections = ["Role", "Task"]
expect_keywords = ["chicken", "recipe"]
min_length = 80

[[cases]]
id = "gen-04"
name = "complex_planning"
idea = "plan a trip to japan"
difficulty = "medium"
description = "Multi-faceted planning task"
expect_sections = ["Role", "Task"]
expect_keywords = ["Japan", "travel"]
min_length = 100

[[cases]]
id = "gen-05"
name = "brainstorm_open"
idea = "give me startup ideas"
difficulty = "hard"
description = "Very open-ended — optimizer must scope and structure"
expect_sections = ["Role", "Task", "Output Format"]
expect_keywords = ["startup", "ideas"]
min_length = 120
