# Benchmark cases for the "code" target domain.

[meta]
domain = "code"
description = "Code generation prompt optimization benchmarks"

[[cases]]
id = "code-01"
name = "vague_api"
idea = "build an API"
difficulty = "easy"
description = "Extremely vague code request"
expect_sections = ["Role", "Task"]
expect_keywords = ["API"]
min_length = 100

[[cases]]
id = "code-02"
name = "todo_app"
idea = "make a todo app"
difficulty = "easy"
description = "Common project — optimizer should add specifics"
expect_sections = ["Role", "Task"]
expect_keywords = ["todo"]
min_length = 100

[[cases]]
id = "code-03"
name = "auth_system"
idea = "add login and registration to my flask app"
difficulty = "medium"
description = "Specific framework, security implications"
expect_sections = ["Role", "Task"]
expect_keywords = ["authentication", "Flask"]
expect_keywords_any = ["password", "hash", "session", "token", "security"]
min_length = 150

[[cases]]
id = "code-04"
name = "data_pipeline"
idea = "process csv files and put them in a database"
difficulty = "medium"
description = "ETL task — optimizer should add error handling, validation"
expect_sections = ["Role", "Task"]
expect_keywords = ["CSV", "database"]
min_length = 120

[[cases]]
id = "code-05"
name = "complex_system"
idea = "build a real-time chat system with websockets"
difficulty = "hard"
description = "Architecture-level task with concurrency concerns"
expect_sections = ["Role", "Task"]
expect_keywords = ["WebSocket", "real-time"]
