# Benchmark cases for the "analysis" target domain.

[meta]
domain = "analysis"
description = "Analysis/research prompt optimization benchmarks"

[[cases]]
id = "ana-01"
name = "market_analysis"
idea = "analyze the electric vehicle market"
difficulty = "easy"
description = "Broad analytical task"
expect_sections = ["Role", "Task"]
expect_keywords = ["electric vehicle", "market"]
min_length = 100

[[cases]]
id = "ana-02"
name = "compare_frameworks"
idea = "compare React and Vue for my project"
difficulty = "medium"
description = "Technology comparison with decision criteria"
expect_sections = ["Role", "Task"]
expect_keywords = ["React", "Vue"]
expect_keywords_any = ["comparison", "trade-off", "advantage", "criteria"]
min_length = 120

[[cases]]
id = "ana-03"
name = "research_review"
idea = "review recent research on large language models"
difficulty = "medium"
description = "Literature review with recency requirement"
expect_sections = ["Role", "Task"]
expect_keywords = ["language model"]
min_length = 120

[[cases]]
id = "ana-04"
name = "complex_analysis"
idea = "figure out why our app is slow"
difficulty = "hard"
description = "Debugging/diagnostic — vague input, needs structured approach"
expect_sections = ["Role", "Task"]
expect_keywords_any = ["performance", "bottleneck", "latency", "slow", "profil"]
min_length = 120
