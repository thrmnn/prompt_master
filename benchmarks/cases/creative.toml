# Benchmark cases for the "creative" target domain.

[meta]
domain = "creative"
description = "Creative writing prompt optimization benchmarks"

[[cases]]
id = "cre-01"
name = "short_story"
idea = "write a story about a robot"
difficulty = "easy"
description = "Simple creative premise"
expect_sections = ["Role", "Task"]
expect_keywords = ["robot", "story"]
min_length = 100

[[cases]]
id = "cre-02"
name = "poem_request"
idea = "write me a poem about the ocean"
difficulty = "easy"
description = "Poetic form with theme"
expect_sections = ["Role", "Task"]
expect_keywords = ["ocean", "poem"]
min_length = 80

[[cases]]
id = "cre-03"
name = "brand_copy"
idea = "catchy tagline for a sustainable clothing brand"
difficulty = "medium"
description = "Marketing creative with brand values"
expect_sections = ["Role", "Task"]
expect_keywords = ["sustainable", "tagline"]
min_length = 100

[[cases]]
id = "cre-04"
name = "complex_narrative"
idea = "a noir detective story set in a cyberpunk city"
difficulty = "hard"
description = "Genre-blending with atmosphere requirements"
expect_sections = ["Role", "Task"]
expect_keywords = ["noir", "detective", "cyberpunk"]
min_length = 120
